name: CI

# Runs on every pull request. No deploy, no push (publishing lives in
# publish.yml and is release-triggered only). Branch protection on main
# requires this workflow to pass — see docs/SECURITY-BASELINE.md.
on:
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff
        run: uv run ruff check

      - name: Mypy
        run: uv run mypy

      - name: Pytest
        run: uv run pytest
