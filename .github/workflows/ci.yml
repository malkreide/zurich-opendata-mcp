name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Python ${{ matrix.python-version }} einrichten
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: uv installieren
        run: pip install uv

      - name: uv Cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('pyproject.toml') }}

      - name: Abhängigkeiten installieren
        run: uv sync --extra dev

      - name: Linting mit ruff
        run: uv run ruff check src/

      - name: Format-Check mit ruff
        run: uv run ruff format --check src/

      - name: Syntax-Prüfung
        run: uv run python -m py_compile src/zurich_opendata_mcp/server.py src/zurich_opendata_mcp/api_client.py

      - name: Import-Test
        run: uv run python -c "from zurich_opendata_mcp.server import mcp; print('Import OK')"
        env:
          PYTHONPATH: src

      - name: Unit-Tests (ohne Live-API)
        run: uv run pytest tests/ -m "not live"
        env:
          PYTHONPATH: src
